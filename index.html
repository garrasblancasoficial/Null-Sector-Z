<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Null_Sector.Z | Panel de Despliegue</title>
    <style>
        body { background: #000; color: #00ff41; font-family: 'Courier New', monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        #interface { border: 2px solid #00ff41; padding: 40px; background: rgba(0,20,0,0.8); text-align: center; box-shadow: 0 0 20px #00ff41; z-index: 10; }
        h1 { font-size: 3em; letter-spacing: 10px; color: #fff; text-shadow: 0 0 10px #00ff41; }
        .row { margin: 20px 0; display: flex; justify-content: space-between; gap: 30px; }
        button { background: #00ff41; color: #000; border: none; padding: 15px 60px; font-weight: bold; cursor: pointer; font-size: 1.5em; transition: 0.3s; }
        button:hover { background: #fff; box-shadow: 0 0 15px #fff; }
        #game-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; }
    </style>
</head>
<body>

    <div id="game-container"></div>

    <div id="interface">
        <h1>Null_Sector.Z</h1>
        <p>> CONFIGURACIÓN DE INSERCIÓN URBANA</p>
        <div class="row">
            <span>TRAJE:</span> <input type="color" id="p-gear" value="#1a1a1a">
        </div>
        <button id="START">DESPLEGAR</button>
    </div>

    <script type="module">
        import { NullSectorEngine } from './STRATUM_CORE.js';
        import { MEGA_DISTRITO } from './DATA_MEGA_DISTRITO.js';

        document.getElementById('START').onclick = () => {
            const playerSettings = {
                gear: document.getElementById('p-gear').value,
                speed: 1.2
            };
            document.getElementById('interface').style.display = 'none';
            document.getElementById('game-container').style.display = 'block';
            
            // EL TALLO INICIA Y PUEBLA LA CIUDAD CON LOS RECURSOS DE LA RAMA
            new NullSectorEngine(MEGA_DISTRITO, playerSettings, 'game-container');
        };
    </script>
</body>
</html>
