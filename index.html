<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Null_Sector.Z | Inicio</title>
    <style>
        body { margin: 0; background: #000; color: #00ff41; font-family: monospace; overflow: hidden; }
        #ui { position: absolute; z-index: 10; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; background: #000; }
        .panel { border: 2px solid #00ff41; padding: 40px; text-align: center; }
        button { background: #00ff41; color: #000; border: none; padding: 20px 40px; font-weight: bold; cursor: pointer; font-size: 1.5em; }
        #game { width: 100vw; height: 100vh; display: none; }
    </style>
</head>
<body>
    <div id="game"></div>
    <div id="ui">
        <div class="panel">
            <h1>NULL_SECTOR.Z</h1>
            <button id="START">DESPLEGAR EN EL DISTRITO</button>
        </div>
    </div>

    <script type="module">
        import { NullSectorEngine } from './STRATUM_CORE.js';
        import { MEGA_DISTRITO } from './DATA_MEGA_DISTRITO.js';

        document.getElementById('START').onclick = () => {
            document.getElementById('ui').style.display = 'none';
            document.getElementById('game').style.display = 'block';
            new NullSectorEngine(MEGA_DISTRITO, { gear: 0x111111, speed: 1.5 }, 'game');
        };
    </script>
</body>
</html>
